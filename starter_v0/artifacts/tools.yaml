# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Gửi một câu hỏi cho người dùng."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tra cứu thông tin trên internet."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi một đoạn văn bản đi."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  - name: reddit_search
    description: "Tìm bài đăng trên Reddit theo từ khóa. Dùng để thu thập ý kiến cộng đồng, thảo luận không chính thức."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa tìm kiếm"}
        subreddit: {type: string, default: "", description: "Tên subreddit (không có r/), để trống để tìm toàn Reddit"}
        limit: {type: integer, default: 5, description: "Số kết quả (tối đa 25)"}
        sort: {type: string, enum: [relevance, new, top, hot], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: translate
    description: "Dịch văn bản giữa các ngôn ngữ. Mặc định: tiếng Anh → tiếng Việt."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Văn bản cần dịch (tối đa 500 ký tự)"}
        target_lang: {type: string, default: "vi", description: "Mã ngôn ngữ đích (vi, en, zh, ja, ko, fr, de, es)"}
        source_lang: {type: string, default: "en", description: "Mã ngôn ngữ nguồn"}
      required: [text]

  - name: github_trending
    description: "Tìm các GitHub repository phổ biến theo chủ đề. Dùng để khám phá dự án AI/ML mã nguồn mở."
    parameters:
      type: object
      properties:
        topic: {type: string, default: "machine-learning", description: "GitHub topic tag (vd: llm, ai-agents, machine-learning)"}
        language: {type: string, default: "", description: "Ngôn ngữ lập trình (vd: python, typescript). Để trống để tìm tất cả"}
        since: {type: string, enum: [daily, weekly, monthly], default: "daily", description: "Khoảng thời gian trending"}
      required: [topic]

  - name: summarize
    description: "Tóm tắt danh sách kết quả từ các tool khác thành bản tin ngắn gọn có đánh số. Dùng trước format hoặc send để gọn dữ liệu."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách items từ lookup/timeline/papers/fetch (mỗi item có title, url, source, summary)"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
        max_points: {type: integer, default: 5, description: "Số điểm tối đa trong tóm tắt"}
        headline: {type: string, default: "", description: "Tiêu đề bản tin"}
      required: [items]
